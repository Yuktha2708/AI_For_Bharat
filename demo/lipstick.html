<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Velvet Matte Lipstick – Demo | FitRight</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 24px; }
    .meta { color: #64748b; margin-bottom: 24px; }
    .shades { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .shade-chip { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; font-size: 13px; }
  </style>
</head>
<body>
  <div data-fitright-demo data-fitright-brand="BeautyDemo" data-fitright-category="makeup" data-fitright-product-type="lipstick">
    <h1>Velvet Matte Lipstick</h1>
    <p class="meta">Brand: BeautyDemo · Category: Lipstick · Add a face photo in the extension for shade recommendations.</p>

    <h2>Shades</h2>
    <p>Use <strong>Get recommendation</strong> for a shade that suits your complexion.</p>
    <div class="shades">
      <span class="shade-chip" data-fitright-shade="Nude Pink">Nude Pink</span>
      <span class="shade-chip" data-fitright-shade="Coral Bliss">Coral Bliss</span>
      <span class="shade-chip" data-fitright-shade="Rosewood">Rosewood</span>
      <span class="shade-chip" data-fitright-shade="Rust">Rust</span>
      <span class="shade-chip" data-fitright-shade="Brick Red">Brick Red</span>
      <span class="shade-chip" data-fitright-shade="Wine">Wine</span>
      <span class="shade-chip" data-fitright-shade="Berry">Berry</span>
      <span class="shade-chip" data-fitright-shade="Plum">Plum</span>
      <span class="shade-chip" data-fitright-shade="Brown Sugar">Brown Sugar</span>
    </div>
  </div>
</body>
</html>
